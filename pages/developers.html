<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Real Estate Developers - CVR</title>

    <link
      rel="shortcut icon"
      href="images/brand/cvr-logo.png"
      type="image/x-icon"
    />

    <link rel="stylesheet" href="/assets/css/developers.css" />
    <link rel="stylesheet" href="/assets/css/main.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- ═══════════════════════════════════════
       NAVIGATION
  ═══════════════════════════════════════ -->
    <div id="nav-placeholder"></div>

    <!-- ═══════════════════════════════════
       HERO
  ═══════════════════════════════════ -->
    <section class="about-hero">
      <div class="container">
        <div class="about-hero__inner">
          <div class="section-label" style="color: var(--color-yellow-light)">
            The top 6 developer
          </div>
          <h1 class="about-hero__title">
            More Than Properties<br />
            <em>Communities Built on Trust</em>
          </h1>
          <p class="about-hero__sub">
            Get to know the builders bringing the best of Philippine living to
            life.
          </p>
        </div>
      </div>
    </section>

    <!-- Developers Grid -->
    <section class="developers-section">
      <div class="container">
        <div id="developersGrid" class="developers-grid">
          <!-- Developers will be loaded here by JavaScript -->
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
        </div>
      </div>
    </section>

    <!-- CTA Banner -->
    <section class="cta-banner">
      <div class="container">
        <h2>Ready to Find Your Dream Home?</h2>
        <p>
          Browse our extensive property listings from these trusted developers
        </p>
        <a href="/listings" class="btn btn-primary">View Properties</a>
      </div>
    </section>

    <!-- ═══════════════════════════════════════
       FOOTER
  ═══════════════════════════════════════ -->
    <div id="footer-placeholder"></div>

    <script src="/assets/js/developers.js"></script>
    <script type="module" src="/assets/js/main.js"></script>
  </body>
</html>
