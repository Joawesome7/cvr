<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Listings — CVR | Cavite Properties For Sale &amp; Rent</title>
    <meta
      name="description"
      content="Browse all CVR properties in Cavite. Filter by city, property type, price range, and more. Houses, condos, and lots for sale and for rent."
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap"
      rel="stylesheet"
    />

    <link
      rel="shortcut icon"
      href="images/brand/cvr-logo.png"
      type="image/x-icon"
    />

    <!-- Stylesheet -->
    <link rel="stylesheet" href="/assets/css/listings.css" />
    <link rel="stylesheet" href="/assets/css/main.css" />
  </head>

  <body>
    <!-- ═══════════════════════════════════════
       NAVIGATION
  ═══════════════════════════════════════ -->
    <div id="nav-placeholder"></div>

    <!-- ═══════════════════════════════════════
       PAGE HEADER
  ═══════════════════════════════════════ -->
    <div class="page-header">
      <div class="container">
        <div class="page-header__inner">
          <div>
            <nav class="breadcrumb" aria-label="Breadcrumb">
              <a href="/">Home</a>
              <span>›</span>
              <span>Listings</span>
            </nav>
            <h1 style="font-size: var(--text-3xl)">Browse Properties</h1>
          </div>
          <p id="headerCount" class="text-muted text-sm"></p>
        </div>
      </div>
    </div>

    <!-- ═══════════════════════════════════════
       FILTER BAR (sticky)
  ═══════════════════════════════════════ -->
    <div class="filter-section" id="filterSection">
      <div class="container">
        <div class="filter-inner" role="search" aria-label="Filter properties">
          <input
            type="text"
            id="filterKeyword"
            placeholder="Search keyword, city, barangay…"
            aria-label="Search keyword"
          />

          <div class="filter-divider" aria-hidden="true"></div>

          <select id="filterType" aria-label="Property type">
            <option value="">All types</option>
            <option value="house">House</option>
            <option value="condo">Condo</option>
            <option value="lot">Lot</option>
            <option value="townhouse">Townhouse</option>
          </select>

          <select id="filterStatus" aria-label="Listing status">
            <option value="">For sale &amp; rent</option>
            <option value="for-sale">For sale</option>
            <option value="for-rent">For rent</option>
          </select>

          <select id="filterCity" aria-label="City">
            <option value="">All cities</option>
            <!-- Cities injected by JS from config.json -->
          </select>

          <select id="filterPrice" aria-label="Price range">
            <option value="">Any price</option>
            <!-- Ranges injected by JS from config.json -->
          </select>

          <div class="filter-divider" aria-hidden="true"></div>

          <button
            class="btn--reset"
            id="resetBtn"
            aria-label="Reset all filters"
          >
            ✕ Reset
          </button>
        </div>

        <!-- Active filter chips -->
        <div
          class="chips-row"
          id="chipsRow"
          aria-label="Active filters"
          aria-live="polite"
        ></div>
      </div>
    </div>

    <!-- ═══════════════════════════════════════
       MAIN CONTENT
  ═══════════════════════════════════════ -->
    <main>
      <div class="container">
        <!-- Results meta row -->
        <div class="results-meta">
          <p class="results-count" id="resultsCount" aria-live="polite">
            Loading properties…
          </p>
          <div class="sort-row">
            <label for="sortBy">Sort by:</label>
            <select id="sortBy" aria-label="Sort properties">
              <option value="featured">Featured first</option>
              <option value="price-asc">Price: low to high</option>
              <option value="price-desc">Price: high to low</option>
              <option value="newest">Newest first</option>
              <option value="area-desc">Largest area</option>
            </select>
          </div>
        </div>

        <!-- Grid — cards rendered here by JS -->
        <div
          class="listings-grid"
          id="listingsGrid"
          aria-label="Property listings"
        >
          <!-- Loading skeletons -->
          <div
            class="card"
            style="animation: none; opacity: 1; transform: none"
          >
            <div
              class="skeleton"
              style="
                height: 220px;
                border-radius: var(--radius-lg) var(--radius-lg) 0 0;
              "
            ></div>
            <div class="card__body" style="gap: 12px">
              <div class="skeleton" style="height: 20px; width: 80%"></div>
              <div class="skeleton" style="height: 14px; width: 55%"></div>
              <div class="skeleton" style="height: 14px; width: 65%"></div>
            </div>
          </div>
          <div
            class="card"
            style="animation: none; opacity: 1; transform: none"
          >
            <div
              class="skeleton"
              style="
                height: 220px;
                border-radius: var(--radius-lg) var(--radius-lg) 0 0;
              "
            ></div>
            <div class="card__body" style="gap: 12px">
              <div class="skeleton" style="height: 20px; width: 75%"></div>
              <div class="skeleton" style="height: 14px; width: 50%"></div>
              <div class="skeleton" style="height: 14px; width: 60%"></div>
            </div>
          </div>
          <div
            class="card"
            style="animation: none; opacity: 1; transform: none"
          >
            <div
              class="skeleton"
              style="
                height: 220px;
                border-radius: var(--radius-lg) var(--radius-lg) 0 0;
              "
            ></div>
            <div class="card__body" style="gap: 12px">
              <div class="skeleton" style="height: 20px; width: 70%"></div>
              <div class="skeleton" style="height: 14px; width: 60%"></div>
              <div class="skeleton" style="height: 14px; width: 45%"></div>
            </div>
          </div>
        </div>

        <!-- Empty state -->
        <div class="empty-state" id="emptyState" role="status">
          <div class="empty-state__icon">🏚️</div>
          <h2 class="empty-state__title">No properties found</h2>
          <p class="empty-state__text">
            Try adjusting your filters — or reset them to see all available
            listings.
          </p>
          <button class="btn btn--primary" id="emptyResetBtn">
            Reset filters
          </button>
        </div>

        <!-- Load more -->
        <div class="load-more-wrap hidden" id="loadMoreWrap">
          <button class="btn btn--secondary btn--lg" id="loadMoreBtn">
            Load more properties
          </button>
          <p
            class="text-muted text-sm"
            style="margin-top: 12px"
            id="loadMoreMeta"
          ></p>
        </div>
      </div>
    </main>

    <!-- ═══════════════════════════════════════
       FOOTER
  ═══════════════════════════════════════ -->
    <div id="footer-placeholder"></div>

    <!-- ═══════════════════════════════════════
       JAVASCRIPT
  ═══════════════════════════════════════ -->
    <script src="/assets/js/listings.js"></script>
    <script type="module" src="/assets/js/main.js"></script>
  </body>
</html>
