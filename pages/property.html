<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title + meta filled dynamically by JS -->
    <title>Property Details — CVR</title>
    <meta name="description" content="View property details on CVR Realty." />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap"
      rel="stylesheet"
    />

    <link
      rel="shortcut icon"
      href="images/brand/cvr-logo.png"
      type="image/x-icon"
    />

    <!-- Stylesheet -->
    <link rel="stylesheet" href="/assets/css/property.css" />
    <link rel="stylesheet" href="/assets/css/main.css" />
  </head>

  <body class="property-page">
    <!-- ═══════════════════════════════════════
       NAVIGATION
  ═══════════════════════════════════════ -->
    <div id="nav-placeholder"></div>

    <!-- ═══════════════════════════════════════
       BREADCRUMB
  ═══════════════════════════════════════ -->
    <div class="breadcrumb-bar">
      <div class="container">
        <nav class="breadcrumb" aria-label="Breadcrumb" id="breadcrumb">
          <a href="/">Home</a>
          <span>›</span>
          <a href="/pages/listings.html">Listings</a>
          <span>›</span>
          <span id="breadcrumbTitle">Loading…</span>
        </nav>
      </div>
    </div>

    <!-- ═══════════════════════════════════════
       MAIN CONTENT — rendered by JS
  ═══════════════════════════════════════ -->
    <div id="pageContent">
      <!-- Loading skeleton -->
      <div class="container">
        <div class="property-layout">
          <div>
            <div
              class="skeleton"
              style="
                width: 100%;
                aspect-ratio: 16/10;
                border-radius: var(--radius-xl);
                margin-bottom: 12px;
              "
            ></div>
            <div style="display: flex; gap: 8px; margin-bottom: 32px">
              <div
                class="skeleton"
                style="width: 80px; height: 60px; border-radius: 8px"
              ></div>
              <div
                class="skeleton"
                style="width: 80px; height: 60px; border-radius: 8px"
              ></div>
              <div
                class="skeleton"
                style="width: 80px; height: 60px; border-radius: 8px"
              ></div>
            </div>
            <div
              class="skeleton"
              style="width: 60%; height: 28px; margin-bottom: 16px"
            ></div>
            <div
              class="skeleton"
              style="width: 80%; height: 20px; margin-bottom: 8px"
            ></div>
            <div
              class="skeleton"
              style="width: 40%; height: 16px; margin-bottom: 32px"
            ></div>
            <div
              class="skeleton"
              style="width: 100%; height: 130px; border-radius: 16px"
            ></div>
          </div>
          <div>
            <div
              class="skeleton"
              style="
                width: 100%;
                height: 320px;
                border-radius: var(--radius-xl);
              "
            ></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ═══════════════════════════════════════
       LIGHTBOX
  ═══════════════════════════════════════ -->
    <div
      class="lightbox"
      id="lightbox"
      role="dialog"
      aria-label="Photo lightbox"
      aria-modal="true"
    >
      <button
        class="lightbox__close"
        id="lightboxClose"
        aria-label="Close lightbox"
      >
        ✕
      </button>
      <button
        class="lightbox__nav lightbox__prev"
        id="lightboxPrev"
        aria-label="Previous photo"
      >
        ‹
      </button>
      <img class="lightbox__img" id="lightboxImg" src="" alt="Property photo" />
      <button
        class="lightbox__nav lightbox__next"
        id="lightboxNext"
        aria-label="Next photo"
      >
        ›
      </button>
      <div class="lightbox__counter" id="lightboxCounter"></div>
    </div>

    <!-- ═══════════════════════════════════════
       FOOTER
  ═══════════════════════════════════════ -->
    <div id="footer-placeholder"></div>

    <!-- ═══════════════════════════════════════
       JAVASCRIPT
  ═══════════════════════════════════════ -->
    <script src="/assets/js/property.js"></script>
    <script type="module" src="/assets//js/main.js"></script>
  </body>
</html>
