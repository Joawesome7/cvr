# Netlify configuration for CVR website

[[redirects]]
  from = "/property"
  to = "/pages/property.html"
  status = 200

[[redirects]]
  from = "/listings"
  to = "/pages/listings.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/pages/about.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/pages/contact.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/pages/404.html"
  status = 404